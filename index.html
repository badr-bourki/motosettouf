<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moto Settouf - Pièces & Accessoires Moto</title>
  <meta name="description" content="Moto Settouf - Votre spécialiste en pièces et accessoires moto au Maroc. Qualité garantie, livraison rapide." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏍️</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    /* ============================================================
       CSS CUSTOM PROPERTIES & RESET
    ============================================================ */
    :root {
      --bg: #0D0D0D;
      --primary: #D4AF37;
      --secondary: #C9A227;
      --text: #FFFFFF;
      --text-muted: #CCCCCC;
      --surface-1: #141414;
      --surface-2: #1b1b1b;
      --surface-3: #222222;
      --surface-4: #2a2a2a;
      --dark: var(--bg);
      --dark-2: var(--surface-1);
      --dark-3: var(--surface-2);
      --dark-4: var(--surface-3);
      --silver: #D8D0B0;
      --silver-light: #EEE6C9;
      --white: #ffffff;
      --primary-dark: var(--secondary);
      --primary-light: #E6C75A;
      --text-light: var(--text-muted);
      --success: #22c55e;
      --warning: #f59e0b;
      --info: #3b82f6;
      --radius-sm: 10px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 24px;
      --shadow-sm: 0 2px 10px rgba(0,0,0,0.25);
      --shadow-md: 0 6px 24px rgba(0,0,0,0.35);
      --shadow-lg: 0 12px 48px rgba(0,0,0,0.45);
      --shadow-gold: 0 10px 28px rgba(212,175,55,0.28);
      --transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
      --transition-fast: all 0.15s ease;
      --navbar-h: 70px;
      --font-main: 'Poppins', sans-serif;
      --font-ar: 'Cairo', sans-serif;
    }

    html[data-theme="white"] {
      --bg: #FFFFFF;
      --primary: #D4AF37;
      --secondary: #B8962E;
      --text: #111111;
      --text-muted: #555555;
      --surface-1: #F6F6F6;
      --surface-2: #EFEFEF;
      --surface-3: #E7E7E7;
      --surface-4: #DFDFDF;
      --silver: #8A7A3A;
      --silver-light: #B9A766;
      --shadow-sm: 0 2px 10px rgba(0,0,0,0.08);
      --shadow-md: 0 6px 24px rgba(0,0,0,0.12);
      --shadow-lg: 0 12px 48px rgba(0,0,0,0.16);
      --shadow-gold: 0 10px 28px rgba(212,175,55,0.22);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; font-size: 16px; }

    body {
      font-family: var(--font-main);
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    html[lang="ar"] body { font-family: var(--font-ar); }

    img { max-width: 100%; display: block; }
    a { text-decoration: none; color: inherit; }
    button { cursor: pointer; font-family: inherit; border: none; outline: none; }
    input, textarea, select { font-family: inherit; outline: none; border: none; }
    ul, ol { list-style: none; }
    ::selection { background: var(--primary); color: white; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--dark-2); }
    ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 3px; }

    /* ============================================================
       UTILITIES
    ============================================================ */
    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .section-title {
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 800;
      line-height: 1.2;
      letter-spacing: 0.5px;
    }

    .section-title span { color: var(--primary); }

    .section-subtitle {
      color: var(--text-light);
      font-size: 1rem;
      margin-top: 0.5rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 28px;
      border-radius: var(--radius-md);
      font-weight: 600;
      font-size: 0.95rem;
      transition: var(--transition);
      cursor: pointer;
      border: 2px solid transparent;
      white-space: nowrap;
    }

    .btn-primary {
      background: linear-gradient(135deg, #D4AF37, #B8962E);
      color: #111111;
      box-shadow: var(--shadow-gold);
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(212,175,55,0.35);
    }

    .btn-outline {
      background: transparent;
      color: var(--text);
      border-color: rgba(212,175,55,0.5);
      backdrop-filter: blur(10px);
    }

    .btn-outline:hover {
      background: rgba(212,175,55,0.08);
      border-color: var(--primary);
      transform: translateY(-2px);
      box-shadow: 0 10px 26px rgba(212,175,55,0.18);
    }

    .btn-ghost {
      background: rgba(212,175,55,0.06);
      color: var(--text);
      border-color: rgba(212,175,55,0.2);
    }

    .btn-ghost:hover {
      background: rgba(212,175,55,0.12);
      color: var(--text);
    }

    .btn-whatsapp {
      background: #25D366;
      color: white;
      box-shadow: 0 4px 20px rgba(37,211,102,0.3);
    }

    .btn-whatsapp:hover {
      background: #1da851;
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(37,211,102,0.4);
    }

    /* ============================================================
       PAGE TRANSITIONS
    ============================================================ */
    .page-enter { opacity: 0; transform: translateY(20px); }
    .page-active { opacity: 1; transform: translateY(0); transition: opacity 0.4s ease, transform 0.4s ease; }

    /* ============================================================
       NAVBAR
    ============================================================ */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      height: var(--navbar-h);
      display: flex;
      align-items: center;
      transition: var(--transition);
      background: transparent;
    }

    .navbar.scrolled {
      background: rgba(13,13,13,0.9);
      backdrop-filter: blur(20px);
      box-shadow: 0 2px 30px rgba(0,0,0,0.5);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    html[data-theme="white"] .navbar.scrolled {
      background: rgba(255,255,255,0.92);
      box-shadow: 0 2px 30px rgba(0,0,0,0.12);
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }

    .navbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: var(--transition);
    }

    .logo:hover { transform: scale(1.03); }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1;
    }

    .logo-name {
      font-size: 1.15rem;
      font-weight: 800;
      color: var(--text);
      letter-spacing: 0.5px;
    }

    .logo-tagline {
      font-size: 0.6rem;
      color: var(--silver);
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 400;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .nav-link {
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text-muted);
      transition: var(--transition-fast);
      cursor: pointer;
      position: relative;
    }

    .nav-link::after {
      content: '';
      position: absolute;
      bottom: 4px;
      left: 50%;
      transform: translateX(-50%) scaleX(0);
      width: 20px;
      height: 2px;
      background: var(--primary);
      border-radius: 2px;
      transition: transform 0.2s ease;
    }

    .nav-link:hover, .nav-link.active {
      color: var(--text);
    }

    .nav-link.active::after, .nav-link:hover::after {
      transform: translateX(-50%) scaleX(1);
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .lang-btn {
      padding: 6px 14px;
      border-radius: 20px;
      background: rgba(212,175,55,0.12);
      border: 1px solid rgba(212,175,55,0.25);
      color: var(--text);
      font-size: 0.8rem;
      font-weight: 600;
      transition: var(--transition-fast);
      letter-spacing: 1px;
    }

    .lang-btn:hover {
      background: var(--primary);
      border-color: var(--primary);
    }

    .cart-btn {
      position: relative;
      width: 42px;
      height: 42px;
      border-radius: var(--radius-sm);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition-fast);
    }

    .cart-btn:hover { background: var(--primary); border-color: var(--primary); }

    .cart-badge {
      position: absolute;
      top: -5px;
      right: -5px;
      background: var(--primary);
      color: white;
      font-size: 0.65rem;
      font-weight: 700;
      min-width: 18px;
      height: 18px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
      border: 2px solid var(--bg);
      animation: badgePop 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }

    @keyframes badgePop {
      0% { transform: scale(0); }
      100% { transform: scale(1); }
    }

    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      padding: 8px;
      cursor: pointer;
      background: rgba(255,255,255,0.08);
      border-radius: var(--radius-sm);
      border: 1px solid rgba(255,255,255,0.12);
    }

    .hamburger span {
      display: block;
      width: 20px;
      height: 2px;
      background: var(--text);
      border-radius: 2px;
      transition: var(--transition);
    }

    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    .mobile-menu {
      position: fixed;
      top: var(--navbar-h);
      left: 0;
      right: 0;
      background: rgba(13,13,13,0.95);
      backdrop-filter: blur(20px);
      z-index: 999;
      padding: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      transform: translateY(-20px);
      opacity: 0;
      pointer-events: none;
      transition: var(--transition);
    }

    html[data-theme="white"] .mobile-menu {
      background: rgba(255,255,255,0.96);
      border-bottom: 1px solid rgba(0,0,0,0.08);
    }

    .mobile-menu.open {
      transform: translateY(0);
      opacity: 1;
      pointer-events: all;
    }

    .mobile-menu .nav-link {
      display: block;
      padding: 14px 16px;
      font-size: 1rem;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    /* ============================================================
       HERO SECTION
    ============================================================ */
    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      min-height: 600px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero-video-wrap {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .hero-video-wrap iframe {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100vw;
      height: 56.25vw; /* 16:9 */
      min-height: 100vh;
      min-width: 177.78vh; /* 16:9 */
      border: none;
      filter: brightness(0.9) contrast(1.1);
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      z-index: 1;
      background: linear-gradient(135deg, rgba(0,0,0,0.45), rgba(0,0,0,0.25));
    }

    .hero-content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 0 20px;
      max-width: 800px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 18px;
      background: rgba(212,175,55,0.12);
      border: 1px solid rgba(212,175,55,0.4);
      border-radius: 30px;
      font-size: 0.8rem;
      font-weight: 600;
      color: #EBD27A;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .hero-badge-dot {
      width: 6px;
      height: 6px;
      background: var(--primary);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    .hero-title {
      font-size: clamp(2.5rem, 7vw, 5rem);
      font-weight: 900;
      line-height: 1.1;
      color: var(--text);
      letter-spacing: 1px;
      text-shadow: 0 2px 20px rgba(0,0,0,0.5);
      animation: fadeUp 0.9s ease 0.1s both;
    }

    .hero-desc {
      font-size: clamp(1rem, 2vw, 1.2rem);
      color: var(--text-muted);
      max-width: 560px;
      line-height: 1.7;
      animation: fadeUp 0.9s ease 0.25s both;
    }

    .hero-actions {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      animation: fadeUp 0.9s ease 0.4s both;
    }

    .hero-actions .btn {
      min-width: 180px;
      letter-spacing: 0.6px;
    }

    .hero-scroll {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      color: var(--text-muted);
      font-size: 0.7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      animation: scrollBounce 2s ease infinite;
    }

    .hero-scroll-line {
      width: 1px;
      height: 40px;
      background: linear-gradient(to bottom, rgba(212,175,55,0.45), transparent);
    }

    @keyframes scrollBounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(8px); }
    }

    /* ============================================================
       FEATURES STRIP
    ============================================================ */
    .features-strip {
      background: var(--dark-2);
      border-top: 1px solid rgba(255,255,255,0.05);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      padding: 0;
    }

    .features-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      divide-x: 1px solid rgba(255,255,255,0.05);
    }

    .feature-item {
      padding: 28px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-right: 1px solid rgba(255,255,255,0.05);
      transition: var(--transition);
    }

    .feature-item:last-child { border-right: none; }
    .feature-item:hover { background: rgba(255,255,255,0.03); }

    .feature-icon {
      width: 48px;
      height: 48px;
      border-radius: var(--radius-sm);
      background: rgba(212,175,55,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--primary);
    }

    .feature-text h4 {
      font-size: 0.9rem;
      font-weight: 700;
      margin-bottom: 2px;
      color: var(--text);
    }

    .feature-text p {
      font-size: 0.75rem;
      color: var(--text-light);
    }

    /* ============================================================
       SECTIONS
    ============================================================ */
    .section { padding: 80px 0; }

    .section-header {
      text-align: center;
      margin-bottom: 56px;
    }

    .section-label {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--primary);
      margin-bottom: 12px;
    }

    /* ============================================================
       PRODUCT CARDS
    ============================================================ */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 24px;
    }

    .product-card {
      background: var(--dark-2);
      border-radius: var(--radius-lg);
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.06);
      transition: var(--transition);
      position: relative;
      cursor: pointer;
    }

    .product-card:hover {
      transform: translateY(-6px);
      border-color: rgba(212,175,55,0.35);
      box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 0 0 1px rgba(212,175,55,0.25);
    }

    .product-img-wrap {
      position: relative;
      aspect-ratio: 1;
      overflow: hidden;
      background: var(--dark-3);
    }

    .product-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }

    .product-card:hover .product-img { transform: scale(1.08); }

    .product-badge {
      position: absolute;
      top: 12px;
      left: 12px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .badge-new { background: var(--primary); color: white; }
    .badge-stock { background: var(--success); color: white; }
    .badge-out { background: var(--text-muted); color: white; }

    .product-actions-overlay {
      position: absolute;
      top: 12px;
      right: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      opacity: 0;
      transform: translateX(10px);
      transition: var(--transition);
    }

    .product-card:hover .product-actions-overlay {
      opacity: 1;
      transform: translateX(0);
    }

    .icon-btn {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-sm);
      background: rgba(13,13,13,0.85);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition-fast);
    }

    .icon-btn:hover { background: var(--primary); border-color: var(--primary); }

    .product-info { padding: 18px; }

    .product-category {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .product-name {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: 1.4;
    }

    .product-rating {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 12px;
    }

    .stars { color: var(--warning); font-size: 0.75rem; letter-spacing: 1px; }
    .rating-count { font-size: 0.7rem; color: var(--text-light); }

    .product-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .product-price {
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--primary);
    }

    .product-price span {
      font-size: 0.75rem;
      font-weight: 400;
      color: var(--text-light);
    }

    .add-cart-btn {
      padding: 8px 16px;
      background: var(--primary);
      color: white;
      border-radius: var(--radius-sm);
      font-size: 0.8rem;
      font-weight: 700;
      transition: var(--transition-fast);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .add-cart-btn:hover {
      background: var(--primary-dark);
      transform: scale(1.05);
    }

    /* Skeleton */
    .skeleton {
      background: linear-gradient(90deg, var(--dark-3) 25%, var(--dark-4) 50%, var(--dark-3) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: var(--radius-sm);
    }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    .skeleton-card {
      background: var(--dark-2);
      border-radius: var(--radius-lg);
      border: 1px solid rgba(255,255,255,0.06);
      overflow: hidden;
    }

    .skeleton-img { aspect-ratio: 1; }
    .skeleton-body { padding: 18px; }
    .skeleton-line { height: 12px; margin-bottom: 10px; border-radius: 4px; }

    /* ============================================================
       STATS
    ============================================================ */
    .stats-section {
      background: linear-gradient(135deg, var(--dark-2) 0%, var(--dark-3) 100%);
      border-top: 1px solid rgba(255,255,255,0.05);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
    }

    .stat-item {
      padding: 48px 32px;
      text-align: center;
      border-right: 1px solid rgba(255,255,255,0.05);
      position: relative;
      overflow: hidden;
    }

    .stat-item::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 2px;
      background: var(--primary);
      border-radius: 2px;
      transition: width 0.5s ease;
    }

    .stat-item:hover::before { width: 100%; }
    .stat-item:last-child { border-right: none; }

    .stat-number {
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 900;
      color: var(--primary);
      line-height: 1;
      margin-bottom: 8px;
    }

    .stat-label {
      font-size: 0.85rem;
      color: var(--silver);
      font-weight: 500;
    }

    /* ============================================================
       WHY CHOOSE US
    ============================================================ */
    .why-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }

    .why-card {
      background: var(--dark-2);
      border-radius: var(--radius-lg);
      padding: 36px 28px;
      border: 1px solid rgba(255,255,255,0.06);
      transition: var(--transition);
      text-align: center;
    }

    .why-card:hover {
      border-color: rgba(212,175,55,0.35);
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
    }

    .why-icon {
      width: 64px;
      height: 64px;
      border-radius: var(--radius-md);
      background: rgba(212,175,55,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      color: var(--primary);
      transition: var(--transition);
    }

    .why-card:hover .why-icon {
      background: var(--primary);
      color: white;
      box-shadow: var(--shadow-gold);
    }

    .why-title {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 10px;
      color: var(--text);
    }

    .why-desc {
      font-size: 0.85rem;
      color: var(--text-light);
      line-height: 1.7;
    }

    /* ============================================================
       PRODUCTS PAGE
    ============================================================ */
    .page-header {
      background: var(--dark-2);
      padding: 100px 0 40px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      margin-bottom: 0;
    }

    .page-header-title {
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      font-weight: 800;
    }

    .page-header-breadcrumb {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      color: var(--text-light);
      margin-top: 8px;
    }

    .breadcrumb-sep { color: var(--text-muted); }
    .breadcrumb-active { color: var(--primary); }

    .search-filter-bar {
      display: flex;
      gap: 16px;
      align-items: center;
      padding: 24px 0;
      flex-wrap: wrap;
    }

    .search-wrap {
      flex: 1;
      min-width: 200px;
      position: relative;
    }

    .search-input {
      width: 100%;
      padding: 12px 16px 12px 44px;
      background: var(--dark-2);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius-md);
      color: var(--text);
      font-size: 0.9rem;
      transition: var(--transition-fast);
    }

    .search-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(212,175,55,0.2);
    }

    .search-input::placeholder { color: var(--text-muted); }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
    }

    .filter-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .filter-tag {
      padding: 8px 18px;
      border-radius: 30px;
      font-size: 0.8rem;
      font-weight: 600;
      background: var(--dark-2);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text-light);
      transition: var(--transition-fast);
      cursor: pointer;
      white-space: nowrap;
    }

    .filter-tag:hover { border-color: var(--primary); color: var(--text); }
    .filter-tag.active { background: var(--primary); color: var(--text); border-color: var(--primary); }

    .results-count {
      font-size: 0.85rem;
      color: var(--text-light);
      padding-bottom: 16px;
    }

    .results-count strong { color: var(--text); }

    /* ============================================================
       PRODUCT DETAIL PAGE
    ============================================================ */
    .detail-page { padding-top: var(--navbar-h); }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      padding: 60px 0;
      align-items: start;
    }

    .gallery-main {
      aspect-ratio: 1;
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: var(--dark-2);
      cursor: zoom-in;
      border: 1px solid rgba(255,255,255,0.08);
      position: relative;
    }

    .gallery-main img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }

    .gallery-main:hover img { transform: scale(1.05); }

    .gallery-zoom-hint {
      position: absolute;
      bottom: 12px;
      right: 12px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      color: white;
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      font-size: 0.7rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .gallery-thumbs {
      display: flex;
      gap: 10px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .gallery-thumb {
      width: 64px;
      height: 64px;
      border-radius: var(--radius-sm);
      overflow: hidden;
      border: 2px solid transparent;
      cursor: pointer;
      transition: var(--transition-fast);
      background: var(--dark-2);
    }

    .gallery-thumb.active { border-color: var(--primary); }
    .gallery-thumb img { width: 100%; height: 100%; object-fit: cover; }

    .detail-brand {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .detail-name {
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 800;
      line-height: 1.3;
      margin-bottom: 16px;
    }

    .detail-rating {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .detail-price-wrap {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    .detail-price {
      font-size: 2rem;
      font-weight: 900;
      color: var(--primary);
    }

    .detail-price-old {
      font-size: 1.1rem;
      color: var(--text-muted);
      text-decoration: line-through;
    }

    .detail-desc {
      color: var(--text-muted);
      font-size: 0.9rem;
      line-height: 1.8;
      margin-bottom: 24px;
      padding-bottom: 24px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    .qty-wrap {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    .qty-label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--silver);
    }

    .qty-control {
      display: flex;
      align-items: center;
      background: var(--dark-2);
      border-radius: var(--radius-sm);
      border: 1px solid rgba(255,255,255,0.1);
      overflow: hidden;
    }

    .qty-btn {
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      color: var(--text);
      font-size: 1.1rem;
      transition: var(--transition-fast);
    }

    .qty-btn:hover { background: var(--primary); }

    .qty-num {
      width: 44px;
      text-align: center;
      font-weight: 700;
      font-size: 1rem;
      border-left: 1px solid rgba(255,255,255,0.08);
      border-right: 1px solid rgba(255,255,255,0.08);
    }

    .detail-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }

    .detail-actions .btn { flex: 1; min-width: 140px; }

    .specs-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 8px;
    }

    .specs-table tr { border-bottom: 1px solid rgba(255,255,255,0.05); }
    .specs-table tr:last-child { border-bottom: none; }

    .specs-table td {
      padding: 10px 0;
      font-size: 0.85rem;
    }

    .specs-table td:first-child {
      color: var(--text-light);
      width: 40%;
    }

    .specs-table td:last-child {
      color: var(--text);
      font-weight: 500;
    }

    .stock-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .stock-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .stock-dot.in-stock { background: var(--success); box-shadow: 0 0 8px rgba(34,197,94,0.5); }
    .stock-dot.out-stock { background: var(--text-muted); }

    /* Lightbox */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(0,0,0,0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .lightbox img {
      max-width: 90vw;
      max-height: 85vh;
      border-radius: var(--radius-md);
      object-fit: contain;
    }

    .lightbox-close {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 44px;
      height: 44px;
      background: rgba(255,255,255,0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.2rem;
      transition: var(--transition-fast);
    }

    .lightbox-close:hover { background: var(--primary); }

    /* ============================================================
       CART DRAWER
    ============================================================ */
    .cart-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 1100;
      backdrop-filter: blur(4px);
      animation: fadeIn 0.2s ease;
    }

    .cart-drawer {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      width: 420px;
      max-width: 100vw;
      background: var(--dark-2);
      z-index: 1101;
      display: flex;
      flex-direction: column;
      border-left: 1px solid rgba(255,255,255,0.07);
      animation: slideInRight 0.35s cubic-bezier(0.4,0,0.2,1);
    }

    html[dir="rtl"] .cart-drawer {
      right: auto;
      left: 0;
      border-left: none;
      border-right: 1px solid rgba(255,255,255,0.07);
      animation: slideInLeft 0.35s cubic-bezier(0.4,0,0.2,1);
    }

    @keyframes slideInRight {
      from { transform: translateX(100%); }
      to { transform: translateX(0); }
    }

    @keyframes slideInLeft {
      from { transform: translateX(-100%); }
      to { transform: translateX(0); }
    }

    .cart-header {
      padding: 20px 24px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .cart-title {
      font-size: 1.1rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .cart-count-pill {
      background: var(--primary);
      color: white;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 10px;
    }

    .cart-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px 24px;
    }

    .cart-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 16px;
      color: var(--text-light);
    }

    .cart-empty-icon { color: var(--dark-4); font-size: 4rem; }

    .cart-item {
      display: flex;
      gap: 14px;
      padding: 16px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      align-items: center;
    }

    .cart-item-img {
      width: 70px;
      height: 70px;
      border-radius: var(--radius-sm);
      object-fit: cover;
      background: var(--dark-3);
      flex-shrink: 0;
    }

    .cart-item-info { flex: 1; min-width: 0; }

    .cart-item-name {
      font-size: 0.85rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }

    .cart-item-price {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--primary);
    }

    .cart-item-qty {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }

    .cart-qty-btn {
      width: 26px;
      height: 26px;
      border-radius: 6px;
      background: var(--dark-3);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      transition: var(--transition-fast);
    }

    .cart-qty-btn:hover { background: var(--primary); }

    .cart-qty-num {
      font-size: 0.85rem;
      font-weight: 600;
      min-width: 20px;
      text-align: center;
    }

    .cart-remove {
      width: 30px;
      height: 30px;
      border-radius: 6px;
      background: rgba(212,175,55,0.12);
      color: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition-fast);
      flex-shrink: 0;
    }

    .cart-remove:hover { background: var(--primary); color: white; }

    .cart-footer {
      padding: 20px 24px;
      border-top: 1px solid rgba(255,255,255,0.07);
      background: var(--dark-3);
    }

    .cart-subtotal {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    .subtotal-label { font-size: 0.85rem; color: var(--text-light); }
    .subtotal-amount { font-size: 1.3rem; font-weight: 800; color: var(--primary); }

    .cart-checkout-btn {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: white;
      border-radius: var(--radius-md);
      font-size: 0.95rem;
      font-weight: 700;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .cart-checkout-btn:hover {
      background: var(--primary-dark);
      box-shadow: var(--shadow-gold);
    }

    .cart-wa-btn {
      width: 100%;
      padding: 12px;
      background: #25D366;
      color: white;
      border-radius: var(--radius-md);
      font-size: 0.9rem;
      font-weight: 700;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .cart-wa-btn:hover { background: #1da851; }

    /* ============================================================
       TOAST NOTIFICATIONS
    ============================================================ */
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9998;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    html[dir="rtl"] .toast-container {
      right: auto;
      left: 24px;
    }

    .toast {
      padding: 14px 18px;
      border-radius: var(--radius-md);
      background: var(--dark-2);
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: var(--shadow-lg);
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.875rem;
      font-weight: 500;
      min-width: 260px;
      max-width: 380px;
      animation: toastSlide 0.35s cubic-bezier(0.34,1.56,0.64,1);
    }

    @keyframes toastSlide {
      from { opacity: 0; transform: translateX(100%) scale(0.8); }
      to { opacity: 1; transform: translateX(0) scale(1); }
    }

    html[dir="rtl"] .toast {
      animation-name: toastSlideRTL;
    }

    @keyframes toastSlideRTL {
      from { opacity: 0; transform: translateX(-100%) scale(0.8); }
      to { opacity: 1; transform: translateX(0) scale(1); }
    }

    .toast-icon {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 1rem;
    }

    .toast.success .toast-icon { background: rgba(34,197,94,0.15); color: var(--success); }
    .toast.error .toast-icon { background: rgba(212,175,55,0.15); color: var(--primary); }
    .toast.info .toast-icon { background: rgba(59,130,246,0.15); color: var(--info); }

    .toast-dismiss {
      margin-left: auto;
      color: var(--text-muted);
      font-size: 1rem;
      padding: 4px;
      transition: var(--transition-fast);
    }

    .toast-dismiss:hover { color: var(--text); }

    /* ============================================================
       CONTACT PAGE
    ============================================================ */
    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1.4fr;
      gap: 40px;
      padding: 60px 0;
    }

    .contact-info-card {
      background: var(--dark-2);
      border-radius: var(--radius-lg);
      padding: 36px;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .contact-item {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      padding: 20px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .contact-item:last-child { border-bottom: none; }

    .contact-item-icon {
      width: 44px;
      height: 44px;
      border-radius: var(--radius-sm);
      background: rgba(212,175,55,0.12);
      color: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .contact-item-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .contact-item-value {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
    }

    .contact-form-card {
      background: var(--dark-2);
      border-radius: var(--radius-lg);
      padding: 36px;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .form-group { margin-bottom: 20px; }

    .form-label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--silver);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-input, .form-textarea, .form-select {
      width: 100%;
      padding: 12px 16px;
      background: var(--dark-3);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 0.9rem;
      transition: var(--transition-fast);
    }

    .form-input:focus, .form-textarea:focus, .form-select:focus {
      border-color: var(--primary);
      background: var(--dark-4);
      box-shadow: 0 0 0 3px rgba(212,175,55,0.2);
    }

    .form-input::placeholder, .form-textarea::placeholder { color: var(--text-muted); }

    .form-textarea { resize: vertical; min-height: 120px; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    /* ============================================================
       FOOTER
    ============================================================ */
    .footer {
      background: var(--dark-2);
      border-top: 1px solid rgba(255,255,255,0.05);
      padding: 60px 0 0;
    }

    .footer-grid {
      display: grid;
      grid-template-columns: 1.5fr 1fr 1fr 1fr;
      gap: 40px;
      margin-bottom: 48px;
    }

    .footer-brand p {
      font-size: 0.85rem;
      color: var(--text-light);
      line-height: 1.8;
      margin: 16px 0 20px;
    }

    .footer-social {
      display: flex;
      gap: 10px;
    }

    .social-btn {
      width: 38px;
      height: 38px;
      border-radius: var(--radius-sm);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--silver);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition-fast);
    }

    .social-btn:hover { background: var(--primary); color: white; border-color: var(--primary); }

    .footer-col-title {
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text);
      margin-bottom: 20px;
    }

    .footer-links { display: flex; flex-direction: column; gap: 10px; }

    .footer-link {
      font-size: 0.85rem;
      color: var(--text-light);
      transition: var(--transition-fast);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .footer-link::before {
      content: '';
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--primary);
      opacity: 0;
      transition: var(--transition-fast);
    }

    .footer-link:hover { color: var(--text); }
    .footer-link:hover::before { opacity: 1; }

    .footer-bottom {
      border-top: 1px solid rgba(255,255,255,0.05);
      padding: 20px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }

    .footer-bottom p {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

      border: 2px solid transparent;

const Stars = ({ rating }) => {
  const r = parseFloat(rating) || 0;
  const full = Math.floor(r);
  const half = r % 1 >= 0.5;
  const empty = 5 - full - (half ? 1 : 0);
  return (
    <span className="stars">
      {'★'.repeat(full)}
      {half ? '½' : ''}
      {'☆'.repeat(empty)}
    </span>
  );
};

const CartDrawer = ({ open, onClose }) => {
  const { cart, removeFromCart, updateQty, lang, t, currency } = useApp();
  const total = cart.reduce((s, i) => s + parseFloat(i.price) * i.qty, 0);

  const buildWAMessage = () => {
    const lines = cart.map(i => `- ${lang === 'ar' ? i.name_ar : i.name_fr} x${i.qty} = ${(parseFloat(i.price) * i.qty).toFixed(0)} DH`).join('\n');
    const msg = `Bonjour Moto Settouf, je voudrais commander:\n${lines}\n\nTotal: ${total.toFixed(0)} DH`;
    return `https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(msg)}`;
  };

  if (!open) return null;
  return (
    <>
      <div className="cart-overlay" onClick={onClose} />
      <div className="cart-drawer">
        <div className="cart-header">
          <div className="cart-title">
            <Icon name="cart" size={20} />
            {t.cart.title}
            {cart.length > 0 && <span className="cart-count-pill">{cart.reduce((s,i)=>s+i.qty,0)}</span>}
          </div>
          <button className="icon-btn" onClick={onClose}><Icon name="close" size={18} /></button>
        </div>
        <div className="cart-body">
          {cart.length === 0 ? (
            <div className="cart-empty">
              <div className="cart-empty-icon"><Icon name="cart" size={56} /></div>
              <p style={{fontWeight:600,color:'var(--silver)'}}>{t.cart.empty}</p>
              <p style={{fontSize:'0.8rem'}}>{t.cart.emptyDesc}</p>
            </div>
          ) : (
            cart.map(item => (
              <div key={item.id} className="cart-item">
                <img className="cart-item-img" src={item.image} alt={lang==='ar'?item.name_ar:item.name_fr} loading="lazy"
                  onError={e => { e.target.src='https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=100&q=60'; }} />
                <div className="cart-item-info">
                  <div className="cart-item-name">{lang==='ar'?item.name_ar:item.name_fr}</div>
                  <div className="cart-item-price">{(parseFloat(item.price)*item.qty).toFixed(0)} {currency}</div>
                  <div className="cart-item-qty">
                    <button className="cart-qty-btn" onClick={()=>updateQty(item.id, item.qty-1)}><Icon name="minus" size={12}/></button>
                    <span className="cart-qty-num">{item.qty}</span>
                    <button className="cart-qty-btn" onClick={()=>updateQty(item.id, item.qty+1)}><Icon name="plus" size={12}/></button>
                  </div>
                </div>
                <button className="cart-remove" onClick={()=>removeFromCart(item.id)} title={t.cart.remove}>
                  <Icon name="close" size={14}/>
                </button>
              </div>
            ))
          )}
        </div>
        {cart.length > 0 && (
          <div className="cart-footer">
            <div className="cart-subtotal">
              <span className="subtotal-label">{t.cart.subtotal}</span>
              <span className="subtotal-amount">{total.toFixed(0)} {currency}</span>
            </div>
            <button className="cart-checkout-btn">
              <Icon name="check" size={18}/> {t.cart.checkout}
            </button>
            <a href={buildWAMessage()} target="_blank" rel="noopener noreferrer" className="cart-wa-btn">
              <Icon name="whatsapp" size={18}/> {t.cart.orderWA}
            </a>
          </div>
        )}
      </div>
    </>
  );
};

      <button className="lightbox-close"><Icon name="close" size={20}/></button>
    </div>
  );
};

/* ============================================================
   ANIMATED COUNTER
============================================================ */
const AnimatedCounter = ({ target, suffix = '' }) => {
  const [count, setCount] = useState(0);
  const ref = useRef(null);
  const started = useRef(false);

  useEffect(() => {
    const observer = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting && !started.current) {
        started.current = true;
        const duration = 2000;
        const steps = 60;
        const step = target / steps;
        let current = 0;
        const interval = setInterval(() => {
          current += step;
          if (current >= target) { setCount(target); clearInterval(interval); }
          else setCount(Math.floor(current));
        }, duration / steps);
      }
    }, { threshold: 0.5 });
    if (ref.current) observer.observe(ref.current);
    return () => observer.disconnect();
  }, [target]);

  return <div ref={ref} className="stat-number">{count.toLocaleString()}{suffix}</div>;
};

const ProductsPage = ({ setPage, setSelectedProduct }) => {
  const { t, products, loading, lang } = useApp();
  const [search, setSearch] = useState('');
  const [activeCategory, setActiveCategory] = useState('all');
  const searchTimer = useRef(null);
  const [debSearch, setDebSearch] = useState('');

  const handleSearch = useCallback(val => {
    clearTimeout(searchTimer.current);
    searchTimer.current = setTimeout(() => setDebSearch(val), 300);
    setSearch(val);
  }, []);

  const filtered = useMemo(() => {
    return products.filter(p => {
      const name = (lang==='ar' ? p.name_ar : p.name_fr) || '';
      const matchSearch = name.toLowerCase().includes(debSearch.toLowerCase()) ||
        (p.description||'').toLowerCase().includes(debSearch.toLowerCase()) ||
        (p.category||'').toLowerCase().includes(debSearch.toLowerCase());
      const matchCat = activeCategory === 'all' || p.category === activeCategory;
      return matchSearch && matchCat;
    });
  }, [products, debSearch, activeCategory, lang]);

  return (
    <div className="page-active">
      <div className="page-header">
        <div className="container">
          <h1 className="page-header-title">{t.products.title} <span style={{color:'var(--primary)'}}>{t.products.titleAccent}</span></h1>
          <div className="page-header-breadcrumb">
            <span style={{cursor:'pointer'}} onClick={()=>setPage('home')}>{t.nav.home}</span>
            <span className="breadcrumb-sep">/</span>
            <span className="breadcrumb-active">{t.nav.products}</span>
          </div>
        </div>
      </div>
      <div className="container">
        <div className="search-filter-bar">
          <div className="search-wrap">
            <span className="search-icon"><Icon name="search" size={16}/></span>
            <input className="search-input" type="text" placeholder={t.products.search}
              value={search} onChange={e=>handleSearch(e.target.value)} />
          </div>
          <div className="filter-tags">
            <button className={`filter-tag ${activeCategory==='all'?'active':''}`} onClick={()=>setActiveCategory('all')}>
              {t.products.all}
            </button>
            {CATEGORIES.map(c => (
              <button key={c} className={`filter-tag ${activeCategory===c?'active':''}`} onClick={()=>setActiveCategory(c)}>
                {c}
              </button>
            ))}
          </div>
        </div>
        <div className="results-count">
          <strong>{filtered.length}</strong> {t.products.results}
        </div>
        {loading ? (
          <div className="products-grid">
            {Array.from({length:8}).map((_,i)=><SkeletonCard key={i}/>)}
          </div>
        ) : filtered.length === 0 ? (
          <div className="no-results">
            <div className="no-results-icon"><Icon name="search" size={48} color="var(--dark-4)"/></div>
            <h3>{t.products.noResults}</h3>
            <p>{t.products.noResultsDesc}</p>
          </div>
        ) : (
          <div className="products-grid">
            {filtered.map(p => (
              <ProductCard key={p.id} product={p} onView={prod=>{setSelectedProduct(prod);setPage('detail');}}/>
            ))}
          </div>
        )}
        <div style={{paddingBottom:'60px'}}/>
      </div>
    </div>
  );
};

          <Logo onClick={() => setPage('home')} />
          <div className="nav-links">
            {navItems.map(item => (
              <span key={item.key} className={`nav-link ${page===item.key?'active':''}`}
                onClick={() => setPage(item.key)}>{item.label}</span>
            ))}
          </div>
          <div className="nav-actions">
            <button className="lang-btn" onClick={toggleLang}>
              {lang === 'fr' ? 'AR' : 'FR'}
            </button>
            <button className="cart-btn" onClick={onCartOpen}>
              <Icon name="cart" size={18}/>
              {cartCount > 0 && <span className="cart-badge">{cartCount}</span>}
            </button>
            <button className={`hamburger ${menuOpen?'open':''}`} onClick={() => setMenuOpen(o=>!o)}>
              <span/><span/><span/>
            </button>
          </div>
        </div>
      </nav>
      <div className={`mobile-menu ${menuOpen?'open':''}`}>
        {navItems.map(item => (
          <span key={item.key} className={`nav-link ${page===item.key?'active':''}`}
            onClick={() => setPage(item.key)}>{item.label}</span>
        ))}
      </div>
    </>
  );
};

/* ============================================================
   THEME SWITCHER
============================================================ */
const ThemeSwitcher = () => {
  const { t } = useApp();
  const [open, setOpen] = useState(false);
  const [active, setActive] = useState(0);

  const applyTheme = (theme, idx) => {
    document.documentElement.setAttribute('data-theme', theme.theme);
    document.documentElement.style.setProperty('--bg', theme.bg);
    document.documentElement.style.setProperty('--primary', theme.primary);
    document.documentElement.style.setProperty('--secondary', theme.secondary);
    document.documentElement.style.setProperty('--text', theme.text);
    document.documentElement.style.setProperty('--text-muted', theme.textMuted);
    document.documentElement.style.setProperty('--primary-dark', theme.secondary);
    document.documentElement.style.setProperty('--primary-light', theme.light);
    setActive(idx);
    setOpen(false);
  };

  return (
    <div className="theme-fab">
      <div className={`theme-panel ${open?'open':''}`}>
        <div className="theme-panel-title">{t.theme}</div>
        <div className="theme-colors">
          {THEMES.map((theme, i) => (
            <div key={i} className={`theme-dot ${active===i?'active':''}`}
              style={{background:theme.primary}} onClick={()=>applyTheme(theme,i)}
              title={theme.name} />
          ))}
        </div>
      </div>
      <button className="theme-toggle-btn" onClick={()=>setOpen(o=>!o)}>
        <Icon name="palette" size={20}/>
      </button>
    </div>
  );
};

/* ============================================================
   BACK TO TOP
============================================================ */
const BackToTop = () => {
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const h = () => setVisible(window.scrollY > 300);
    window.addEventListener('scroll', h, { passive: true });
    return () => window.removeEventListener('scroll', h);
  }, []);
  return (
    <button className={`back-to-top ${visible?'visible':''}`} onClick={() => window.scrollTo({top:0,behavior:'smooth'})}>
      <Icon name="arrowUp" size={18}/>
    </button>
  );
};

/* ============================================================
   SCROLL REVEAL
============================================================ */
const useScrollReveal = () => {
  useEffect(() => {
    const observer = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) { e.target.classList.add('visible'); }
      });
    }, { threshold: 0.1 });
    const revealEls = document.querySelectorAll('.reveal');
    revealEls.forEach(el => observer.observe(el));
    return () => observer.disconnect();
  });
};

/* ============================================================
   MAIN APP
============================================================ */
const App = () => {
  const [page, setPage] = useState('home');
  const [selectedProduct, setSelectedProduct] = useState(null);
  const [lang, setLang] = useState('fr');
  const [products, setProducts] = useState([]);
  const [loading, setLoading] = useState(true);
  const [cart, setCart] = useState([]);
  const [cartOpen, setCartOpen] = useState(false);
  const [toasts, setToasts] = useState([]);

  const t = translations[lang];
  const currency = t.currency;

  /* Language Toggle */
  const toggleLang = useCallback(() => {
    setLang(l => {
      const next = l === 'fr' ? 'ar' : 'fr';
      document.documentElement.lang = next;
      document.documentElement.dir = next === 'ar' ? 'rtl' : 'ltr';
      return next;
    });
  }, []);

  /* Toast System */
  const addToast = useCallback((message, type = 'success') => {
    const id = Date.now() + Math.random();
    setToasts(prev => [...prev, { id, message, type }]);
    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 4000);
  }, []);

  const removeToast = useCallback(id => {
    setToasts(prev => prev.filter(t => t.id !== id));
  }, []);

  /* Cart Actions */
  const addToCart = useCallback((product) => {
    setCart(prev => {
      const exists = prev.find(i => i.id === product.id);
      if (exists) {
        return prev.map(i => i.id === product.id ? { ...i, qty: i.qty + (product.qty || 1) } : i);
      }
      return [...prev, { ...product, qty: product.qty || 1 }];
    });
    addToast(translations[lang].toast.added, 'success');
  }, [lang, addToast]);

  const removeFromCart = useCallback((id) => {
    setCart(prev => prev.filter(i => i.id !== id));
    addToast(translations[lang].toast.removed, 'info');
  }, [lang, addToast]);

  const updateQty = useCallback((id, qty) => {
    if (qty < 1) { removeFromCart(id); return; }
    setCart(prev => prev.map(i => i.id === id ? { ...i, qty } : i));
  }, [removeFromCart]);

  const cartCount = cart.reduce((s, i) => s + i.qty, 0);

  /* Fetch Products */
  useEffect(() => {
    const fetchProducts = async () => {
      try {
        const res = await fetch('https://sheetdb.io/api/v1/ldtmj89luzbuu');
        if (!res.ok) throw new Error('API Error');
        const data = await res.json();
        if (!data || data.length === 0) throw new Error('Empty');
        const normalized = data.map((item, idx) => ({
          ...item,
          id: item.id || String(idx + 1),
          price: item.price || '299',
          image: item.image || 'https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=400&q=80',
          category: item.category || 'Accessoires',
          stock: item.stock || '10',
          rating: item.rating || '4.5',
          name_fr: item.name_fr || 'Produit',
          name_ar: item.name_ar || 'منتج',
          description: item.description || 'Description du produit.',
        }));
        setProducts(normalized);
      } catch (err) {
        console.warn('API fallback:', err.message);
        setProducts(fallbackProducts);
      } finally {
        setLoading(false);
      }
    };
    fetchProducts();
  }, []);

  /* Scroll Reveal Hook */
  useScrollReveal();

  /* Page Change → scroll top */
  useEffect(() => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, [page]);

  /* Context Value */
  const ctx = {
    lang, t, currency, products, loading,
    cart, addToCart, removeFromCart, updateQty,
    toasts, addToast, removeToast,
  };

  /* Render */
  const renderPage = () => {
    switch(page) {
      case 'home': return <HomePage setPage={setPage} setSelectedProduct={setSelectedProduct}/>;
      case 'products': return <ProductsPage setPage={setPage} setSelectedProduct={setSelectedProduct}/>;
      case 'detail': return selectedProduct
        ? <DetailPage product={selectedProduct} setPage={setPage} setSelectedProduct={setSelectedProduct}/>
        : <ProductsPage setPage={setPage} setSelectedProduct={setSelectedProduct}/>;
      case 'contact': return <ContactPage/>;
      default: return <HomePage setPage={setPage} setSelectedProduct={setSelectedProduct}/>;
    }
  };

  return (
    <AppContext.Provider value={ctx}>
      <Navbar
        page={page}
        setPage={setPage}
        cartCount={cartCount}
        onCartOpen={() => setCartOpen(true)}
        lang={lang}
        toggleLang={toggleLang}
      />
      <main style={{ paddingTop: page !== 'home' ? 'var(--navbar-h)' : '0' }}>
        {renderPage()}
      </main>
      <Footer setPage={setPage}/>
      <CartDrawer open={cartOpen} onClose={() => setCartOpen(false)}/>
      <ToastContainer toasts={toasts} removeToast={removeToast}/>
      <ThemeSwitcher/>
      <BackToTop/>
    </AppContext.Provider>
  );
};

/* ============================================================
   MOUNT
============================================================ */
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
